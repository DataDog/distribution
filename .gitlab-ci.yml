include: https://gitlab-templates.ddbuild.io/compute-delivery/v3/compute-delivery.yml

test:
  stage: verify
  tags: [ "arch:amd64" ]
  image: registry.ddbuild.io/images/mirror/golang:1.25.9
  variables:
    GOTOOLCHAIN: "auto"
  script:
    - make test

build-docker-image:
  variables:
    EXTRA_ARGS: "-f Dockerfile.dd"
  extends: .build-docker-image

build-nydus-image:
  needs: ["build-docker-image"]
  extends: .build-nydus-image
